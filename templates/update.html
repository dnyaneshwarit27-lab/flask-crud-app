{% extends 'base.html' %}

{% block title %}Edit Task - Task Manager{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>Edit Task</h2>
        <a href="{{ url_for('index') }}" class="back-link">&larr; Back to Dashboard</a>
    </div>
    <form method="POST" class="custom-form">
        <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" value="{{ task.title }}" required class="form-control">
        </div>
        
        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea id="description" name="description" rows="4" class="form-control">{{ task.description or '' }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-control" required>
                <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-block">Update Task</button>
        </div>
    </form>
</div>
{% endblock %}
