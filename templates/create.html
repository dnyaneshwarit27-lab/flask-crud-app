{% extends 'base.html' %}

{% block title %}Create Task - Task Manager{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>Create New Task</h2>
        <a href="{{ url_for('index') }}" class="back-link">&larr; Back to Dashboard</a>
    </div>
    <form method="POST" class="custom-form">
        <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" required placeholder="Enter task title" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea id="description" name="description" rows="4" placeholder="Provide more details..." class="form-control"></textarea>
        </div>
        
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-control" required>
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-block">Save Task</button>
        </div>
    </form>
</div>
{% endblock %}
